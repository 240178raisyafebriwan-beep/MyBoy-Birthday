<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memories ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:ital,wght@0,400;1,700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #000;
            overflow: hidden;
            color: white;
            font-family: 'Quicksand', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* EFEK BACKGROUND (RINGAN) */
        /* BACKGROUND MEWAH & DINAMIS */
        body {
            background: #020205; /* Hitam deep space */
        }

        .nebula {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
            filter: blur(80px); /* Kunci agar warna menyatu lembut */
            opacity: 0.8;
            overflow: hidden;
        }

        /* Bola-bola cahaya organik */
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            mix-blend-mode: screen;
            animation: move 20s infinite alternate;
        }

        .blob.pink {
            background: radial-gradient(circle, #ec8ab6 0%, transparent 70%);
            top: -10%;
            left: -10%;
        }

        .blob.purple {
            background: radial-gradient(circle, #9333ea 0%, transparent 70%);
            bottom: -10%;
            right: -10%;
            animation-duration: 25s;
            animation-direction: reverse;
        }

        .blob.blue {
            background: radial-gradient(circle, #00d4ff 0%, transparent 70%);
            top: 40%;
            left: 30%;
            width: 600px;
            height: 600px;
            animation-duration: 30s;
        }

        /* EFEK BINTANG KELAP-KELIP */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.5); opacity: 1; box-shadow: 0 0 10px white; }
        }

        /* Tambahan agar gradasi nebula lebih tajam warnanya */
        .blob.pink { background: radial-gradient(circle, #ff1b6b 0%, transparent 70%); }
        .blob.purple { background: radial-gradient(circle, #450eff 0%, transparent 70%); }

        /* Animasi gerakan acak (tidak kaku) */
        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30vw, 20vh) scale(1.2); }
            66% { transform: translate(-10vw, 40vh) scale(0.8); }
            100% { transform: translate(10vw, -10vh) scale(1.1); }
        }

        /* Partikel kilauan kecil */
        .stars-container {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.4;
            z-index: 1;
        }

        .content-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 50px 0;
            box-sizing: border-box;
        }

        /* BAGIAN ATAS (TEKS) */
        .text-section {
            text-align: center;
            padding: 0 20px;
        }

        #extra-words {
            font-family: 'Dancing Script', cursive;
            font-size: 20px;
            color: #ff7eb9;
            opacity: 0;
            transition: 2s ease;
            margin-bottom: 10px;
            display: block;
        }

        #note {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            opacity: 0;
            transform: translateY(10px);
            transition: 1.5s;
        }

        /* BAGIAN TENGAH (AREA FOTO) */
        .center-section {
            position: relative;
            width: 100%;
            height: 380px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #card {
            position: absolute;
            width: 170px;
            height: 230px;
            background: #fff;
            padding: 10px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(255,126,185,0.3);
            cursor: pointer;
            z-index: 50;
            transform: rotate(-3deg);
            transition: 0.5s ease-in-out;
        }

        #card img { width: 100%; height: 80%; object-fit: cover; }
        #card .caption { height: 20%; display: flex; align-items: center; justify-content: center; font-family: 'Dancing Script', cursive; color: #333; font-size: 14px; }

        #photo-container {
            position: absolute;
            width: 90vw;
            max-width: 380px;
            height: 380px;
            transform: scale(0);
            transition: 0.8s ease;
        }

        .pic {
            position: absolute;
            width: 80px; height: 80px;
            border-radius: 8px; overflow: hidden;
            border: 2px solid #fff; opacity: 0; transform: scale(0);
            transition: 0.6s all;
        }
        .pic img { width: 100%; height: 100%; object-fit: cover; }
        .pic.show { opacity: 1; transform: scale(1); }

        /* POSISI HATI */
        .p1 { top: 5%;  left: 20%; }  .p10 { top: 15%; left: 45%; }
        .p2 { top: 5%;  left: 70%; }  .p3 { top: 30%; left: 0%; }
        .p4 { top: 30%; left: 80%; }  .p5 { top: 55%; left: 5%; }
        .p6 { top: 55%; left: 75%; }  .p7 { top: 75%; left: 25%; }
        .p8 { top: 75%; left: 65%; }  .p9 { top: 90%; left: 45%; }

        /* BAGIAN BAWAH (TOMBOL KIRI & KECIL) */
        .bottom-section {
            width: 100%;
            display: flex;
            justify-content: flex-start; 
            padding-left: 30px; 
            box-sizing: border-box;
        }

        #next-btn {
            transform: scale(0);
            padding: 7px 18px; 
            background: transparent;
            border: 1.5px solid #ff7eb9; 
            color: #ff7eb9;
            font-weight: 500;
            font-size: 13px; 
            border-radius: 30px;
            cursor: pointer;
            transition: 0.4s;
            font-family: 'Quicksand', sans-serif;
            opacity: 0.8;
        }

        #next-btn:hover { background: #ff7eb9; color: white; opacity: 1; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>

    <div class="nebula">
        <div class="blob pink"></div>
        <div class="blob purple"></div>
        <div class="blob blue"></div>
    </div>

    <div class="stars" id="star-container"></div>

    <div class="content-wrapper">
        <div class="text-section">
            <span id="extra-words">Every moment with you is a treasure...</span>
            <div id="note">I kept these memories<br>only for you ✨</div>
        </div>

        <div class="center-section">
            <div id="card">
                <img src="foto.jpg"> 
                <div class="caption">Klik untuk buka</div>
            </div>

            <div id="photo-container">
                <div class="pic p1"><img src="foto1.jpg"></div>
                <div class="pic p10"><img src="foto10.jpg"></div>
                <div class="pic p2"><img src="foto2.jpg"></div>
                <div class="pic p3"><img src="foto3.jpg"></div>
                <div class="pic p4"><img src="foto4.jpg"></div>
                <div class="pic p5"><img src="foto5.jpg"></div>
                <div class="pic p6"><img src="foto6.jpg"></div>
                <div class="pic p7"><img src="foto7.jpg"></div>
                <div class="pic p8"><img src="foto8.jpg"></div>
                <div class="pic p9"><img src="foto9.jpg"></div>
            </div>
        </div>

        <div class="bottom-section">
            <button id="next-btn" onclick="nextPage()">Lanjutkan →</button>
        </div>
    </div>

    <audio id="backsound" loop>
        <source src="1000KALI.mp3" type="audio/mpeg">
    </audio>

    <script>
        function createStars() {
            const container = document.getElementById('star-container');
            const starCount = 150; // Jumlah bintang

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                // Ukuran acak
                const size = Math.random() * 3 + 'px';
                star.style.width = size;
                star.style.height = size;
                
                // Posisi acak
                star.style.top = Math.random() * 100 + '%';
                star.style.left = Math.random() * 100 + '%';
                
                // Durasi kedip acak agar tidak barengan (tidak kaku)
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.animationDelay = Math.random() * 5 + 's';
                
                container.appendChild(star);
            }
        }
        createStars();
        // Animasi teks saat web dibuka
        setTimeout(() => {
            document.getElementById("note").style.opacity = 1;
            document.getElementById("note").style.transform = "translateY(0)";
        }, 500);

        const card = document.getElementById("card");
        const photoContainer = document.getElementById("photo-container");
        const pics = document.querySelectorAll(".pic");
        const nextBtn = document.getElementById("next-btn");
        const extraWords = document.getElementById("extra-words");

        card.onclick = () => {
            card.style.transform = "scale(0) rotate(15deg)";
            card.style.opacity = "0";
            
            setTimeout(() => {
                photoContainer.style.transform = "scale(1)";
                pics.forEach((pic, i) => {
                    setTimeout(() => {
                        pic.classList.add("show");
                        setTimeout(() => {
                            pic.style.animation = `float ${3 + Math.random()}s ease-in-out infinite`;
                        }, 600);
                    }, i * 150);
                });

                setTimeout(() => { extraWords.style.opacity = 1; }, 1000);
                setTimeout(() => { nextBtn.style.transform = "scale(1)"; }, 3500);
            }, 400);
        };

        function nextPage() { window.location.href = "halaman3.html"; }

        window.onload = function() {
            const audio = document.getElementById("backsound");
            const saved = localStorage.getItem("musicTimestamp");
            if (saved) audio.currentTime = parseFloat(saved);
            audio.play().catch(e => console.log("Musik butuh klik user"));
            setInterval(() => { localStorage.setItem("musicTimestamp", audio.currentTime); }, 1000);
        };
    </script>
</body>
</html>
