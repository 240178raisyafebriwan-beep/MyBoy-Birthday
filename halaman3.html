<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist For U</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden; /* Supaya partikel tidak bikin scroll */
        }

        /* ANIMASI BACKGROUND PARTIKEL */
        .background {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 126, 185, 0.5);
            border-radius: 50%;
            animation: move linear infinite;
        }

        @keyframes move {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(-100vh); opacity: 0; }
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 400px;
            z-index: 10; /* Di atas partikel */
        }

        /* JUDUL TAMBAHAN */
        h2 {
            font-family: 'Dancing Script', cursive;
            color: #ff7eb9;
            font-size: 28px;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(255, 126, 185, 0.7);
        }

        .music-card {
            background-color: rgba(18, 18, 18, 0.8);
            width: 100%;
            border-radius: 25px;
            padding: 15px;
            border: 1px solid rgba(255, 126, 185, 0.5);
            box-shadow: 0 0 40px rgba(255, 126, 185, 0.3);
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .btn-lanjut {
            background-color: transparent;
            color: #ff7eb9;
            text-decoration: none;
            padding: 12px 50px;
            border-radius: 30px;
            font-weight: bold;
            border: 2px solid #ff7eb9;
            transition: 0.3s;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 14px;
        }

        .btn-lanjut:hover {
            background-color: #ff7eb9;
            color: white;
            box-shadow: 0 0 20px rgba(255, 126, 185, 0.6);
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="background" id="bg"></div>

    <div class="container">
        <h2>Special Song For You ✨</h2>
        
        <div class="music-card">
           <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/playlist/1azC4nGfhxwLHDtZW9HzZH?utm_source=generator" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>

        <a href="halaman4.html" class="btn-lanjut">Lanjut →</a>
    </div>

    <audio id="backsound" loop>
        <source src="1000KALI.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Membuat partikel background otomatis
        const bg = document.getElementById('bg');
        for (let i = 0; i < 30; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.style.left = Math.random() * 100 + 'vw';
            dot.style.top = Math.random() * 100 + 'vh';
            dot.style.animationDuration = (Math.random() * 3 + 2) + 's';
            dot.style.opacity = Math.random();
            bg.appendChild(dot);
        }

        // Logika Musik
        window.onload = function() {
            const audio = document.getElementById("backsound");
            const savedTimestamp = localStorage.getItem("musicTimestamp");

            if (savedTimestamp) {
                audio.currentTime = parseFloat(savedTimestamp);
            }

            audio.play().then(() => {
                setInterval(() => {
                    localStorage.setItem("musicTimestamp", audio.currentTime);
                }, 1000);
            }).catch(e => {
                console.log("Autoplay diblokir, butuh klik.");
            });
        };
    </script>
</body>
</html>
